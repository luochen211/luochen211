<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ideas to Workflows to Products</title>
  <desc id="desc">An animated visual showing ideas becoming workflows and products.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12161A"/>
      <stop offset="0.52" stop-color="#1B2024"/>
      <stop offset="1" stop-color="#0E1113"/>
    </linearGradient>
    <linearGradient id="orange" x1="40" y1="60" x2="1120" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB35C"/>
      <stop offset="0.5" stop-color="#F47D4F"/>
      <stop offset="1" stop-color="#E05C54"/>
    </linearGradient>
    <linearGradient id="teal" x1="70" y1="350" x2="1130" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5BD4C5"/>
      <stop offset="1" stop-color="#6C9DFF"/>
    </linearGradient>
    <filter id="glow-orange" x="-30%" y="-100%" width="160%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-teal" x="-30%" y="-100%" width="160%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#FFFFFF" stroke-opacity="0.045"/>
    </pattern>
    <style>
      .word { font: 600 48px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -2px; }
      .micro { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 2px; }
      @media (prefers-reduced-motion: reduce) {
        .motion { animation: none !important; }
      }
    </style>
  </defs>

  <rect width="1200" height="420" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="24" fill="url(#grid)"/>
  <circle cx="1000" cy="55" r="150" fill="#FF8A5B" fill-opacity="0.07"/>
  <circle cx="150" cy="390" r="190" fill="#5BD4C5" fill-opacity="0.05"/>

  <text x="64" y="74" class="micro" fill="#A5AFB4">LUOCHEN / PRODUCT SYSTEMS</text>
  <text x="64" y="174" class="word" fill="#F8F3EA">Ideas</text>
  <text x="446" y="174" class="word" fill="#F8F3EA">Workflows</text>
  <text x="930" y="174" class="word" fill="#F8F3EA">Products</text>

  <path d="M54 288C180 208 270 334 390 272C506 212 568 200 688 272C810 347 886 170 1144 226" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
  <path class="motion" d="M54 288C180 208 270 334 390 272C506 212 568 200 688 272C810 347 886 170 1144 226" stroke="url(#orange)" stroke-width="3" stroke-linecap="round" stroke-dasharray="18 16" filter="url(#glow-orange)">
    <animate attributeName="stroke-dashoffset" from="0" to="-220" dur="8s" repeatCount="indefinite"/>
  </path>
  <path class="motion" d="M54 330C210 350 270 238 408 300C554 366 646 318 752 242C882 150 934 292 1144 278" stroke="url(#teal)" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 22" filter="url(#glow-teal)">
    <animate attributeName="stroke-dashoffset" from="0" to="240" dur="11s" repeatCount="indefinite"/>
  </path>

  <g class="motion">
    <circle cx="390" cy="272" r="5" fill="#FFB35C">
      <animate attributeName="r" values="5;10;5" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="1;0.35;1" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="752" cy="242" r="5" fill="#5BD4C5">
      <animate attributeName="r" values="5;10;5" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="1;0.35;1" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="64" y="378" class="micro" fill="#738087">AI-NATIVE PRODUCTS · CODEX WORKFLOWS · CLEAR WRITING</text>
  <text x="1136" y="378" text-anchor="end" class="micro" fill="#738087">BUILD / SHIP / LEARN</text>
</svg>
